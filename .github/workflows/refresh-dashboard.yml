name: Refresh dashboard snapshots

# Daily EOD regime refresh. Runs at 21:30 UTC (16:30 ET — 30 min after
# US equity close, late enough that yfinance has settled today's bar).
#
# Pipeline:
#   1. Regenerate dashboard/public/data/**.json from fresh yfinance/FRED
#   2. Commit + push refreshed JSON to main (audit trail)
#   3. Deploy explicitly via `vercel deploy --prod --prebuilt` using the
#      VERCEL_TOKEN secret. We don't rely on Vercel's GitHub webhook
#      because it has been flaky for this project (occasionally drops
#      pushes silently or rejects on author checks).

on:
  schedule:
    - cron: "30 21 * * *"   # 21:30 UTC every day
  workflow_dispatch: {}      # manual run via GH UI / `gh workflow run`

permissions:
  contents: write            # commit refreshed JSON back to main

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

env:
  VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Regenerate snapshots
        env:
          REGIME_V2_NO_CACHE: "1"
          # `|| ''` fallback so forks without FRED_API_KEY still run
          # (FRED fetch fails gracefully → None → bundle degrades).
          FRED_API_KEY: ${{ secrets.FRED_API_KEY || '' }}
        run: python scripts/build_dashboard_data.py

      - name: Commit refreshed data
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/public/data
          if git diff --cached --quiet; then
            echo "no changes — markets closed or yfinance returned an unchanged frame"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "data: daily snapshot refresh ($(date -u +%Y-%m-%d))"
          git push
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Set up Node
        if: steps.commit.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        if: steps.commit.outputs.changed == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel env (production)
        if: steps.commit.outputs.changed == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel prebuilt)
        if: steps.commit.outputs.changed == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: steps.commit.outputs.changed == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
