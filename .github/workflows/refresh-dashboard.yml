name: Refresh dashboard snapshots

# Daily EOD regime refresh. Runs at 21:30 UTC (16:30 ET — 30 min after
# US equity close, late enough that yfinance has settled today's bar).
# Auto-deploy is handled by the Vercel GitHub integration: pushing a
# commit to main with new dashboard/public/data/**.json triggers
# Vercel to rebuild the dashboard automatically.

on:
  schedule:
    - cron: "30 21 * * *"   # 21:30 UTC every day
  workflow_dispatch: {}      # manual run via GH UI / `gh workflow run`

permissions:
  contents: write            # commit refreshed JSON back to main

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the GITHUB_TOKEN for pushing — `contents: write` lets us push.
          # No PAT needed.
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Regenerate snapshots
        env:
          REGIME_V2_NO_CACHE: "1"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/build_dashboard_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/public/data
          if git diff --cached --quiet; then
            echo "no changes — markets must be closed and yfinance returned an unchanged frame"
            exit 0
          fi
          git commit -m "data: daily snapshot refresh ($(date -u +%Y-%m-%d))"
          git push
